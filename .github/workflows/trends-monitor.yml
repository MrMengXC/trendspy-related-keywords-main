name: Google Trends Monitor

on:
  schedule:
    # 每天 UTC 时间 22 点运行一次（等于北京时间次日 6 点）
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-trends-monitor:
    runs-on: ubuntu-latest
    # env:
    #   # 在仓库 Settings -> Secrets and variables -> Actions 中配置 FEISHU_WEBHOOK
    #   TRENDS_FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trends monitor (once, test mode)
        run: |
          python trends_monitor.py --test

